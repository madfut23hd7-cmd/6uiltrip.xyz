<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>6uiltrip.xyz</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:monospace;
}

body{
background:#000;
color:#00ff88;
overflow-x:hidden;
}

/* MATRIX */
canvas{
position:fixed;
inset:0;
z-index:-2;
}

.container{
max-width:520px;
margin:auto;
padding:18px;
text-align:center;
}

.logo{
font-size:2.4rem;
margin-top:20px;
text-shadow:0 0 10px #00ff88;
}

/* CARD */
.card{
margin-top:14px;
padding:14px;
border:1px solid #00ff88;
border-radius:12px;
background:rgba(0,0,0,0.75);
box-shadow:0 0 12px rgba(0,255,136,0.25);
}

.small{
font-size:12px;
opacity:0.7;
}

/* BUTTON */
.btn{
display:block;
margin-top:10px;
padding:10px;
border:1px solid #00ff88;
color:#00ff88;
text-decoration:none;
border-radius:8px;
}

.btn:active{
background:#00ff88;
color:#000;
}

/* WALLET */
.wallet{
margin-top:10px;
padding:10px;
border:1px solid #00ff88;
border-radius:10px;
text-align:left;
position:relative;
}

.wallet code{
font-size:11px;
word-break:break-all;
opacity:0.85;
display:block;
margin-top:6px;
}

/* QR */
.qr{
width:60px;
height:60px;
position:absolute;
right:10px;
top:10px;
border:1px solid #00ff88;
border-radius:6px;
}

/* COPY BUTTON */
.copy{
margin-top:8px;
width:100%;
padding:6px;
border:1px solid #00ff88;
background:none;
color:#00ff88;
cursor:pointer;
}

/* TICKER */
.ticker{
font-size:12px;
opacity:0.85;
}

/* MOBILE FIX */
@media(max-width:420px){
.qr{
position:static;
display:block;
margin-top:8px;
}
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">

<div class="logo" id="type">6UILTRIP</div>

<div class="card">
<div class="small">Discord</div>
<div>6uiltrip</div>
<a class="btn" href="https://discord.gg/eNJPy55MQX">Join Server</a>
</div>

<div class="card">
<div class="small">Live Crypto Prices</div>
<div class="ticker" id="prices">Loading...</div>
</div>

<div class="card">
<div class="small">Wallets</div>

<div class="wallet">
<div>BTC</div>
<img class="qr" src="https://api.qrserver.com/v1/create-qr-code/?size=80x80&data=bc1qy6zhy03nv6rw7s4nrt2c453het78mt4wy9amtr">
<code id="btc">bc1qy6zhy03nv6rw7s4nrt2c453het78mt4wy9amtr</code>
<button class="copy" onclick="copy('btc',this)">Copy</button>
</div>

<div class="wallet">
<div>ETH</div>
<img class="qr" src="https://api.qrserver.com/v1/create-qr-code/?size=80x80&data=0x867437e1bBEAE36F6fFa36827B618e3aDaa249Bb">
<code id="eth">0x867437e1bBEAE36F6fFa36827B618e3aDaa249Bb</code>
<button class="copy" onclick="copy('eth',this)">Copy</button>
</div>

<div class="wallet">
<div>SOL</div>
<img class="qr" src="https://api.qrserver.com/v1/create-qr-code/?size=80x80&data=CZdsusmB3VH17ML9vovnStep5KSEZWS4fsvkPKJgdvhN">
<code id="sol">CZdsusmB3VH17ML9vovnStep5KSEZWS4fsvkPKJgdvhN</code>
<button class="copy" onclick="copy('sol',this)">Copy</button>
</div>

<div class="wallet">
<div>LTC</div>
<img class="qr" src="https://api.qrserver.com/v1/create-qr-code/?size=80x80&data=Lb6gfXaybd1WuHbxhd214hv7LdkBam4qW4">
<code id="ltc">Lb6gfXaybd1WuHbxhd214hv7LdkBam4qW4</code>
<button class="copy" onclick="copy('ltc',this)">Copy</button>
</div>

</div>

</div>

<script>

/* TYPE EFFECT */
const t="6UILTRIP";
let i=0;
setInterval(()=>{
document.getElementById("type").innerText=t.slice(0,i++);
if(i>t.length)i=0;
},200);

/* SAFE COPY FIX */
function copy(id,btn){
const el=document.getElementById(id);
navigator.clipboard.writeText(el.innerText);
btn.innerText="Copied";
setTimeout(()=>btn.innerText="Copy",1200);
}

/* MATRIX (RESIZE SAFE) */
const c=document.getElementById("matrix");
const ctx=c.getContext("2d");

function resize(){
c.width=window.innerWidth;
c.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

const chars="BTCETHSOLLTC0123456789#$%";
const size=14;
let cols=()=>Math.floor(c.width/size);
let drops=[];

function initDrops(){
drops=Array.from({length:cols()},()=>1);
}
initDrops();

window.addEventListener("resize",initDrops);

function draw(){
ctx.fillStyle="rgba(0,0,0,0.08)";
ctx.fillRect(0,0,c.width,c.height);

ctx.fillStyle="#00ff88";
ctx.font=size+"px monospace";

for(let x=0;x<drops.length;x++){
const ch=chars[Math.floor(Math.random()*chars.length)];
ctx.fillText(ch,x*size,drops[x]*size);

if(drops[x]*size>c.height && Math.random()>0.98){
drops[x]=0;
}
drops[x]++;
}
}

setInterval(draw,40);

/* PRICES (SAFE) */
async function loadPrices(){
try{
const r=await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana,litecoin&vs_currencies=usd");
const d=await r.json();

document.getElementById("prices").innerText=
`BTC $${d?.bitcoin?.usd ?? "?"} | ETH $${d?.ethereum?.usd ?? "?"} | SOL $${d?.solana?.usd ?? "?"} | LTC $${d?.litecoin?.usd ?? "?"}`;
}catch(e){
document.getElementById("prices").innerText="Price feed offline";
}
}
loadPrices();
setInterval(loadPrices,15000);

</script>

</body>
</html></html></html></html></html></html></html>
