<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>6uiltrip.xyz</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:monospace;
}
body{
background:#000;
overflow-x:hidden;
color:#00ff88;
}
canvas{
position:fixed;
top:0;
left:0;
z-index:-2;
}
#particles{
position:fixed;
width:100%;
height:100%;
z-index:-1;
pointer-events:none;
}
.container{
max-width:900px;
margin:auto;
padding:40px 20px;
text-align:center;
}
.logo{
font-size:4rem;
font-weight:bold;
animation:glitch 2s infinite;
text-shadow:
0 0 10px #00ff88,
0 0 20px #00ff88,
0 0 40px #00ff88;
}
@keyframes glitch{
0%{transform:translate(0)}
20%{transform:translate(-2px,2px)}
40%{transform:translate(2px,-2px)}
60%{transform:translate(-2px,0)}
80%{transform:translate(2px,2px)}
100%{transform:translate(0)}
}
.typing{
margin-top:20px;
font-size:1.2rem;
height:40px;
}
.card{
margin-top:30px;
padding:20px;
background:rgba(0,0,0,.75);
border:1px solid #00ff88;
border-radius:15px;
box-shadow:0 0 25px #00ff88;
}
.btn{
display:block;
margin:10px auto;
width:250px;
padding:12px;
text-decoration:none;
color:#00ff88;
border:1px solid #00ff88;
transition:.3s;
}
.btn:hover{
background:#00ff88;
color:black;
}
.terminal{
text-align:left;
background:black;
padding:15px;
height:250px;
overflow:auto;
margin-top:20px;
border:1px solid #00ff88;
}
</style>
</head>
<body>
<canvas id="matrix"></canvas>
<canvas id="particles"></canvas>
<div class="container">
<div class="logo">
6UILTRIP
</div>
<div class="typing" id="typing"></div>
<div class="card">
<p>Discord: 6uiltrip</p>
<p>Roblox: sljcin</p>
<a class="btn" href="https://discord.gg/larpx">
Join Discord Server
</a>
<div class="terminal" id="terminal"></div>
</div>
</div>
<script>
const text=[
"ACCESS GRANTED",
"CONNECTED TO NETWORK",
"CRYPTO MODE ENABLED",
"DISCORD: 6uiltrip"
];
let line=0;
let char=0;
function type(){
if(char<text[line].length){
document.getElementById("typing")
.innerHTML+=text[line][char];
char++;
setTimeout(type,80);
}else{
setTimeout(()=>{
document.getElementById("typing")
.innerHTML="";
line=(line+1)%text.length;
char=0;
type();
},1500);
}
}
type();
const terminal=
document.getElementById("terminal");
const commands=[
"> initializing...",
"> loading profile...",
"> connecting to discord...",
"> syncing network...",
"> access granted...",
"> connected."
];
let i=0;
setInterval(()=>{
terminal.innerHTML+=
commands[i%commands.length]
+"<br>";
terminal.scrollTop=
terminal.scrollHeight;
i++;
},2000);
const canvas=
document.getElementById("matrix");
const ctx=
canvas.getContext("2d");
canvas.width=
window.innerWidth;
canvas.height=
window.innerHeight;
const chars=
"01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const size=16;
const cols=
canvas.width/size;
const drops=[];
for(let x=0;x<cols;x++){
drops[x]=1;
}
function draw(){
ctx.fillStyle=
"rgba(0,0,0,0.05)";
ctx.fillRect(
0,0,
canvas.width,
canvas.height
);
ctx.fillStyle="#00ff88";
ctx.font=
size+"px monospace";
for(let i=0;i<drops.length;i++){
let txt=
chars[Math.floor(
Math.random()*chars.length
)];
ctx.fillText(
txt,
i*size,
drops[i]*size
);
if(
drops[i]*size>
canvas.height &&
Math.random()>0.975
){
drops[i]=0;
}
drops[i]++;
}
}
setInterval(draw,35);
const pCanvas=
document.getElementById("particles");
const pCtx=
pCanvas.getContext("2d");
pCanvas.width=
window.innerWidth;
pCanvas.height=
window.innerHeight;
const particles=[];
for(let i=0;i<100;i++){
particles.push({
x:Math.random()*pCanvas.width,
y:Math.random()*pCanvas.height,
r:Math.random()*2
});
}
function animateParticles(){
pCtx.clearRect(
0,0,
pCanvas.width,
pCanvas.height
);
particles.forEach(p=>{
p.y-=0.5;
if(p.y<0)
p.y=pCanvas.height;
pCtx.beginPath();
pCtx.arc(
p.x,
p.y,
p.r,
0,
Math.PI*2
);
pCtx.fillStyle=
"#00ff88";
pCtx.fill();
});
requestAnimationFrame(
animateParticles
);
}
animateParticles();
</script>
</body>
</html>
